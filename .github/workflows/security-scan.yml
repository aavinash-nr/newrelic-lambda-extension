name: Security Scan

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  schedule:
    - cron: '0 9 * * *' # Daily security scan at 9 AM UTC

jobs:
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # tag v4.1.7

      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # tag v5.0.2
        with:
          go-version: '1.23'
          cache-dependency-path: |
             go.sum

      - name: Build extension
        run: make build

      - name: Download Go modules
        run: go mod download

      - name: Run Trivy vulnerability scanner in table mode
        # Table output is useful when running on a pull request or push for immediate feedback
        if: contains(fromJSON('["push", "pull_request"]'), github.event_name)
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # tag v0.28.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          scanners: 'vuln,secret,config'

      - name: Run Trivy vulnerability scanner in SARIF mode
        # Generate SARIF report for scheduled runs to upload to GitHub Security tab
        if: ${{ github.event_name == 'schedule' }}
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # tag v0.28.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          scanners: 'vuln,secret,config'

      - name: Run Trivy for PR comment
        # Generate SARIF for PR comments when vulnerabilities are found
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # tag v0.28.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          scanners: 'vuln,secret,config'

      - name: Upload Trivy scan results to GitHub Security tab
        # Upload SARIF when running scheduled scans or PR scans
        if: ${{ github.event_name == 'schedule' || github.event_name == 'pull_request' }}
        uses: github/codeql-action/upload-sarif@662472033e021d55d94146f66f6058822b0b39fd # tag v3.27.0
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

  go-security-scan:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # tag v4.1.7

      - name: Setup Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # tag v5.0.2
        with:
          go-version: '1.23'
          cache-dependency-path: |
             go.sum

      - name: Run gosec Security Scanner
        continue-on-error: true
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          echo "Running gosec security scan..."
          gosec -fmt sarif -out gosec-results.sarif ./...
          echo "Running gosec for console output..."
          gosec ./...

      - name: Upload gosec scan results to GitHub Security tab
        if: ${{ github.event_name == 'schedule' || github.event_name == 'pull_request' }}
        uses: github/codeql-action/upload-sarif@662472033e021d55d94146f66f6058822b0b39fd # tag v3.27.0
        continue-on-error: true
        with:
          sarif_file: 'gosec-results.sarif'

      - name: Fail if vulnerabilities found
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
        run: |
          echo "Security scan completed. Check the logs above for any vulnerabilities found."
          if [ -f "trivy-results.sarif" ] && [ -s "trivy-results.sarif" ]; then
            echo "Trivy found security issues. Please review the scan results."
          fi
          if [ -f "gosec-results.sarif" ] && [ -s "gosec-results.sarif" ]; then
            echo "Gosec found security issues. Please review the scan results."
          fi
          echo "Please check the Security tab in GitHub for detailed results."

      - name: Comment on PR with security scan results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔒 Security Scan Results\n\n';
            
            // Check if Trivy found issues
            if (fs.existsSync('trivy-results.sarif')) {
              const trivyResults = fs.readFileSync('trivy-results.sarif', 'utf8');
              if (trivyResults.trim()) {
                comment += '⚠️ **Trivy Security Scanner detected vulnerabilities**\n';
                comment += 'Please check the [Security tab](https://github.com/${{ github.repository }}/security/code-scanning) for detailed results.\n\n';
              } else {
                comment += '✅ **Trivy Security Scanner**: No vulnerabilities detected\n\n';
              }
            }
            
            // Check if gosec found issues
            if (fs.existsSync('gosec-results.sarif')) {
              const gosecResults = fs.readFileSync('gosec-results.sarif', 'utf8');
              if (gosecResults.trim()) {
                comment += '⚠️ **gosec Security Scanner detected issues**\n';
                comment += 'Please check the [Security tab](https://github.com/${{ github.repository }}/security/code-scanning) for detailed results.\n\n';
              } else {
                comment += '✅ **gosec Security Scanner**: No issues detected\n\n';
              }
            }
            
            comment += 'View the complete security scan logs in the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
